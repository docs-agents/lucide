name: Build and Deploy

# 向主干 main 分支推送代码时触发部署
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1' # 选择适合的 Node.js 版本
      
      - name: Install dependencies
        run: npm i -g pnpm && cd docs && pnpm install
      
      - name: Build project
        run: cd docs && pnpm docs:build && pnpm build:api
      
      - name: Deploy to EdgeOne Pages
        run: npx edgeone pages deploy docs -n lucide -t ${{ secrets.EDGEONE_API_TOKEN }} -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}